    get: async (key) => {
      const v = localStorage.getItem(key);
      return v === null ? null : { value: v };
    },
    set: async (key, value) => {
      localStorage.setItem(key, value);
      return { value };
    },
    delete: async (key) => {
      localStorage.removeItem(key);

// Each port's content is written to be opinionated, warm, and trust-the-reader.
// Structure is shared across ports so the component can render any of them.

  split: {
    intro: "Split is the easiest port of the whole cruise. The ship docks a 10-minute flat walk from a living 1,700-year-old Roman palace — and most of what's worth seeing is inside those walls. You do not need a tour. You need comfortable shoes, €50 in your pocket, and a willingness to get a little lost.",
    pitch: "Here's what I'd do with six hours: walk the Riva to the Bronze Gate, wander the Palace until you're hungry, eat something at Villa Spiza or Konoba Fetivi, climb the bell tower if you've got the knees for it, and be back on the Riva for a cold beer an hour before all-aboard.",
    route: {
      title: "The walk from the ship",
      body: "Depending on which berth you're assigned, you're either 5 minutes (inner berths, Gat Sv. Petra) or 10–15 minutes (outer berths, Gat Svetog Duje) from the Old Town. Either way, you walk east along the Riva — the long palm-lined waterfront promenade — with the harbor on your right and cafés on your left. You literally cannot get lost; keep walking until you see the Palace walls. Enter through the Bronze Gate (south side, directly off the Riva). That dumps you into the Palace cellars and, up one level, the Peristyle — the central courtyard where you'll want to stand still for a minute and take it in.",
    },
    sights: [
      { name: "The Peristyle & Cathedral of St. Domnius", note: "The open-air square at the heart of the Palace. Free to enter. The cathedral was originally Diocletian's mausoleum — the irony being that he persecuted Christians and is now buried under a church dedicated to one of his victims. Bell tower climb is ~€7, 183 steps, and the views are worth every one of them if Mamma Bev sits this out." },
      { name: "Jupiter's Temple", note: "Around the corner from the Peristyle, now a baptistry. Small, quiet, usually empty. A €3 ticket and five minutes of your time." },
      { name: "The Palace Cellars (Podrumi)", note: "The vast underground halls beneath the Palace — also the place where Daenerys kept her dragons if you're into that. ~€10, 30 minutes. Skip if you're short on time; the street-level Palace is the real show." },
      { name: "Riva promenade & the Green Market (Pazar)", note: "The Pazar is a noisy open-air fruit-and-veg market just outside the Silver Gate (east side). Buy a peach, eat it standing up, watch the locals argue about tomatoes. This is Split." },
    ],
    food: [
      { name: "Villa Spiza", tier: "Cheap & authentic", note: "Tiny, two tables outside, handwritten menu that changes daily based on what was at the market that morning. Cash only, no reservations, possibly a wait. Worth it. This is the kind of place travel writers keep trying to stop mentioning and failing. €12–20 a plate." },
      { name: "Konoba Fetivi", tier: "Mid-range, Michelin Bib Gourmand", note: "Family-run, Dalmatian classics done properly. Black risotto, grilled fish by the kilo, apple strudel for dessert. The safe bet if Villa Spiza is full or the line looks long. ~€25–40 a plate. Phone reservations only: +385 21 355 152." },
      { name: "Kantun Paulina", tier: "On the go", note: "Counter-service ćevapi (grilled minced meat in flatbread) near the Old Town. €6 and filling. Good for whoever in the group needs to eat right now and doesn't care about ambiance." },
      { name: "Bokeria", tier: "Nicer dinner, if you have the time", note: "Buzzy wine-bar-slash-restaurant in the Old Town. Great wine list, oxtail risotto, high-ceiling room. It's trendy and a little scene-y but the food delivers. Skip it if you just want a quick lunch — go only if you're lingering." },
    ],
    practical: [

      { label: "Taxis", body: "Don't bother. The Old Town is a 10-minute walk. Drivers won't even take the fare." },
      { label: "Wifi & bathrooms", body: "Free city wifi along the Riva (network: 'Split'). Public bathrooms are scarce and usually €1–2; most cafés will let you use theirs if you buy a coffee first, which you should be doing anyway." },
      { label: "October weather", body: "Expect 65–72°F / 18–22°C, mostly sunny with a chance of a quick afternoon shower. Layers. The Adriatic is still warm enough to swim if you're brave — Bačvice Beach is a 5-minute walk east of the terminal." },
      { label: "Warnings", body: "Marjan Hill is beautiful but it's a real climb and stone paths — skip it with Beverly. The Palace cellars have uneven footing and low ceilings; watch your head. Don't buy the fake Game of Thrones tour pamphlets being hawked on the Riva — the real filming sites are underwhelming, and the Palace itself is the real draw." },

  kotor: {
    intro: "Kotor is a tender port for larger ships — you'll take a small boat from Carnival Legend to the pier, a 5-to-20-minute ride depending on how busy the bay is that morning. The silver lining: the tender drops you 200 meters from the Old Town walls, which is basically the closest any Mediterranean port gets you to its main attraction. From the pier, an underground pedestrian tunnel with escalators gets you to the Sea Gate without crossing any road. It is wildly convenient.",
    pitch: "Here's what I'd do: walk the tunnel to the Sea Gate, spend two hours wandering Old Town and the Cathedral of St. Tryphon, grab lunch at Scala Santa or Galion, and then decide whether the legs and the weather are up for the 1,350-step climb to St. John's Fortress — or whether you're smarter than me and just sit in Arms Square with a glass of Vranac wine watching the cats.",
    route: {
      title: "The walk from the tender",
      body: "Tender drops you at the Kotor pier. Walk straight ahead to the underground pedestrian tunnel (it has escalators) — this gets you under the busy coastal road and delivers you within sight of the Sea Gate, Old Town's main entrance. Total walk: under 5 minutes. The gate features a winged Venetian lion and opens into Arms Square, the largest square in the Old Town. From there every narrow alley leads somewhere worth seeing, and you cannot get meaningfully lost — the city walls are never more than a few minutes in any direction.",
    },
    sights: [
      { name: "Cathedral of St. Tryphon", note: "Built in 1166, this Romanesque cathedral is the heart of Old Town and honors Kotor's patron saint. Small entry fee (~€3), and you can climb to the towers for bay views without the punishment of the fortress hike. Inside: stunning frescoes, relics, and a cool, quiet break from the sun." },
      { name: "Arms Square & the Clock Tower", note: "The main square inside the Sea Gate. 17th-century Clock Tower, cafés along the edges, and some of the friendliest cats you will ever meet. (Kotor has a serious cat thing going on — there's a whole souvenir industry around it. Just go with it.)" },
      { name: "St. John's Fortress climb", note: "1,350 steps up the mountain behind Old Town to a ruined fortress with the best view in the Adriatic. ~€15, allow 90 minutes round trip. Unshaded, unevenly maintained, and brutal in the heat. **Beverly, absolutely skip this.** For everyone else: worth it if the legs are up for it. Go early, bring water, and don't underestimate it." },
      { name: "Maritime Museum", note: "Housed in a Baroque palace, small but well-curated — ship models, nautical instruments, old costumes. 45 minutes, ~€4. A good rainy-day option or a quiet break between wandering and lunch." },

    food: [

      { name: "Galion", tier: "Nicer · waterfront", note: "Just outside the walls with a terrace over the bay. Fresh seafood, Montenegrin classics, and the view is the view. ~€30–50 a plate. Go for lunch when the light is best and the place is less crowded than dinner." },
      { name: "Tanjga", tier: "Cheap & hearty", note: "Grilled meats, enormous portions, no pretense. Locals eat here. If you want ćevapi and a Nikšićko beer for under €15, this is the move. Minimal English menu — point at what other people are eating." },

  dubrovnik: {
    intro: "Dubrovnik is the postcard — the 900-year-old walled city that every travel magazine has been photographing for a decade, and yes, also where they shot King's Landing. The catch: the cruise port (Gruž) is 2.5 km from the Old City. You can't just walk off the ship into the walls like in Split or Kotor. You have to get there, and you need a plan for the return trip because Old Town traffic is famously unpredictable.",
    pitch: "Here's what I'd do: take the cruise line shuttle or public bus #1A/1B to Pile Gate — don't overthink it, don't pay for a taxi unless your party is at least 3 people. Walk Stradun end to end. Decide then whether the legs and the wallet want the ramparts walk (iconic, exhausting, €35). Have lunch somewhere off Stradun (not ON Stradun — tourist trap pricing). Take the cable car up Mount Srđ if the weather's clear. Be back on the bus at least 90 minutes before all-aboard. Dubrovnik traffic will try to make you miss the ship.",
    route: {
      title: "The walk from the pier (well, the shuttle)",
      body: "Carnival Legend docks at Gruž, 2.5 km northwest of the Old Town. Your real options are: (1) the cruise line's shuttle to Pile Gate for a few euros — the easiest, drops you 50 meters from the main Old Town entrance; (2) public bus #1A, #1B, or #8 from the stop right across the street from the port — €1.60–3, about 10–15 minutes; (3) taxi, which is fixed at ~€13 one-way. With 17 of you, splitting into 4-person taxis might actually make sense. Walking it is technically possible (30–40 minutes along the waterfront) but the route isn't scenic and in afternoon heat you'll regret it.",
    },
    sights: [
      { name: "The Stradun (main street)", note: "The polished-limestone main street that runs from Pile Gate to Ploče Gate across the Old City. It glows in the afternoon sun because centuries of feet have worn it mirror-smooth. Free. Just walk it. The best way to feel the scale of this place is end to end, then back, drifting into side alleys when something catches your eye." },
      { name: "The City Walls ramparts walk", note: "1.5 miles of 900-year-old walls wrapping the entire Old City. €35, 1.5–2 hours, relentless stairs and sun exposure. **Beverly, skip this one** — the up-and-down never really stops. For everyone else: this is the single best thing you can do in Dubrovnik. Start early to beat the heat and the cruise crowds. If you only do one paid thing in Dubrovnik, make it this." },
      { name: "Mount Srđ cable car", note: "Four-minute cable car from just outside Ploče Gate to the top of Mount Srđ for panoramic views of the whole walled city and the Adriatic stretching out forever. €27 return, €15 one-way if you want to walk down. Skippable if the ramparts walk already gave you the views, essential if you didn't do the ramparts." },
      { name: "Buža Bar", note: "A cliffside bar literally carved into the outside of the city walls — you enter through a hole in the wall marked 'cold drinks' and emerge on a rocky ledge over the Adriatic with deck chairs and a bartender and nothing else. The drinks are overpriced but the setting is unreal. Stay for one, take the picture, move on." },

    food: [

      { name: "Taj Mahal", tier: "Mid-range · not Indian", note: "Despite the name, this is a Bosnian-Herzegovinian restaurant near Pile Gate. Incredible ćevapi, burek, and grilled meats at prices that feel like a correction after an hour in Old Town shops. ~€15–25 a plate. The best mid-range meal in the city, full stop." },
      { name: "Lady Pi-Pi", tier: "Cheap-ish · famous view", note: "Up a steep alley on the north side of Old Town, this grill-restaurant has a terrace with a killer view of the city rooftops and a giant wood-fired grill. Touristy, yes, but the mixed grill is honest and the view is the view. No reservations, expect a line. ~€20–35 a plate." },
      { name: "Buffet Škola", tier: "On the go", note: "A tiny sandwich shop just off Stradun selling hot fresh sandwiches on homemade bread for under €8. Get the one with prosciutto and cheese. Eat it standing up in a side alley. Done." },

      { label: "ATMs", body: "Plenty in Old Town and at Gruž port. Stick to bank-branded ATMs and decline DCC. There's a bank ATM just outside Pile Gate." },
      { label: "Transport", body: "Uber and Bolt both work in Dubrovnik if the bus lines are chaotic. For the return trip, give yourself extra time — afternoon traffic between Old Town and Gruž can turn a 15-minute ride into 40 minutes, and missing the ship is the only way to really ruin this stop." },
      { label: "Wifi & bathrooms", body: "Free wifi in most cafés and some public squares. Public bathrooms on Stradun are €2 — carry coins or use a café." },
      { label: "October weather", body: "Expect 62–72°F / 17–22°C, mostly sunny but October is the wettest month of fall here. A light rain jacket is worth packing. The sea is still swimmable at Banje Beach if anyone's brave." },
      { label: "Warnings", body: "Watch your feet on Stradun — the polished limestone is slick as ice when wet. The ramparts walk has no shade, no bathrooms, and no way to shortcut out partway through. Bring water. Don't eat at restaurants directly on Stradun; the same meal is half-price and twice as good two alleys inland." },

  corfu: {
    intro: "Corfu is the quietest and most un-Greek of our stops — four centuries of Venetian rule plus stints under French and British control left it with elegant arched arcades, a French-style square, cricket fields (seriously), and the only place in Greece where you can drink kumquat liqueur made from local fruit the British planted in the 1800s. The Old Town is UNESCO-listed, compact, walkable, and low-drama. After Split, Kotor, and Dubrovnik's walled intensity, Corfu feels like exhaling.",
    pitch: "Here's what I'd do: bus or shuttle to the Old Town (don't walk — the 2 km from port is along a busy road and not worth it), head straight to the Liston arcade for a coffee, wander the narrow lanes of the Campiello district, stop at Saint Spyridon church, climb the Old Fortress for the view, and have a long lunch at Rex or Venetian Well. Buy a bottle of kumquat liqueur to take home because no one will believe you otherwise.",
    route: {
      title: "The walk (and bus) from the pier",
      body: "Cruise ships dock at the New Port, about 2 km from Corfu Old Town. Walking it is possible but not scenic — along a busy road, 20–25 minutes. Smarter: take the local bus. **Bus #16** (Port–Spilia) runs from the port to the Old Town for €1.60, 10 minutes. **Bus #17** goes to Spianada Square (Liston area), the heart of the Old Town. Bus stop is a 2-minute walk from the cruise terminal. If the cruise line is running a shuttle, that works too (usually ~€5 round trip). Taxis run ~€10 one-way. Once you're at the Liston, everything is walkable.",
    },
    sights: [
      { name: "The Liston Promenade", note: "The French-built arched arcade lining the west side of Spianada Square, modeled on the Rue de Rivoli in Paris. Café after café under the arches. Sit at one, order a freshly squeezed orange juice or a ginger beer (the local thing, a British leftover), and watch the town. This is what Corfu does better than anyone else: slow, unhurried public space." },
      { name: "The Old Fortress", note: "Venetian fortress on a rocky peninsula jutting into the sea east of the Old Town. Entry ~€6, crosses a short bridge across a moat. Climb to the top for views of the entire town and the Ionian stretching away. Not a brutal climb — doable for most, though it's open and sunny. Allow 45–60 minutes." },
      { name: "Saint Spyridon Church", note: "Corfu's patron saint's church, right in the middle of Old Town, with a red-domed bell tower you can see from anywhere. The saint's mummified body is inside a silver sarcophagus — locals parade it through the streets four times a year. Free to enter, quick visit, weirdly moving." },
      { name: "The Campiello district", note: "The oldest, most Venetian part of Old Town — narrow alleys, drying laundry strung between balconies, tiny squares you stumble into by accident. No specific thing to see here; the district itself is the point. Get lost for an hour. It's safe, it's small, you'll come out somewhere recognizable." },
    ],
    food: [
      { name: "Restaurant Rex", tier: "Mid-range · institution since 1932", note: "Behind the Liston on Kapodistriou street. Traditional Corfiot cooking — pastitsada (Corfu's signature rooster/beef stew), sofrito, chicken with kumquat sauce, grandmother's spinach pie. ~€12–20 a main. Reliable, warm, been there forever for a reason." },
      { name: "Venetian Well", tier: "Nicer · atmospheric", note: "Set around a 17th-century well in a hidden Old Town square. Upscale Corfiot-Mediterranean, the most romantic spot in town. ~€35–60 a plate. Go for lunch if you can — the square in daylight is magical. Reservations recommended." },
      { name: "Bellissimo", tier: "Cheap & family", note: "Family-owned in a quiet little square, great for groups. Homemade pizza (yes, in Greece, but this is Venetian-influenced Corfu and it works), salads, classic Greek mains. Warm and unpretentious. ~€10–18 a plate." },
      { name: "Corfu Sailing Club restaurant", tier: "Hidden gem · view", note: "Tucked inside the Old Fortress at the end of a walk through the complex. Outdoor seating by a tiny beach, cicadas in the trees, mid-range Mediterranean cooking. Hard to find, which is the point. ~€25–40 a plate." },
    ],
    practical: [
      { label: "Currency", body: "Euros. Corfu is noticeably cheaper than the Italian or Croatian ports." },
      { label: "ATMs", body: "Plenty around Spianada Square and along the main streets. Use bank-branded ATMs." },
      { label: "Buses", body: "The local bus #16 is the cheap easy way in and out. Buy tickets at the nearby kiosk or from the driver. Keep your return ticket on you." },
      { label: "Wifi & bathrooms", body: "Free wifi in Spianada Square and most Liston cafés. Public bathrooms are scarce — the Liston cafés are your best bet." },
      { label: "October weather", body: "The best month for Corfu, honestly. Expect 65–75°F / 18–24°C, mostly sunny, the crowds have thinned, and the light has that golden Ionian quality. Pack a light layer for evening." },
      { label: "Kumquat liqueur", body: "Buy it. It's only made on Corfu, it's a protected designation of origin product, and it's the one souvenir that actually tastes like somewhere. Small bottles ~€8, bigger ones ~€15. Available in most Old Town shops." },

  naples: {
    intro: "Naples is the grand finale, and it's also the port where Going Rogue matters least — because the real question isn't 'what do you do in Naples?' It's 'do you leave Naples at all?' Twelve hours ashore and four legendary options pulling in four different directions: Pompeii, the Amalfi Coast, Capri, or Naples itself. Trying to combine any two of these is the single biggest mistake cruisers make here. Pick ONE story. Commit.",
    pitch: "Here's what I'd do, and I'd do it differently depending on the group. **History family:** Pompeii, half day, back in Naples for a pizza lunch. **Romance family:** Capri, ferry over, spend the whole day on the island, ferry back. **View family:** Amalfi Coast, hire a private driver (it's the only way to do it well in a single day), pick Positano OR Amalfi town, not both. **Stay-put family:** Naples itself — pizza at L'Antica Pizzeria da Michele, the Archaeological Museum (where most of Pompeii's actual treasures live), the historic center. All four are defensible. Doing two of them is not.",
    route: {
      title: "The ship docks in the city",
      body: "Naples is the only stop where Carnival Legend docks right in the city center. Molo Beverello is 10 minutes' walk from Piazza del Plebiscito and the historic core, and right next to the ferry terminal for Capri/Sorrento/Amalfi. Walk off, turn inland, and you're in Naples in five minutes. No shuttle needed. For day trips outside Naples, the infrastructure is also right there: hydrofoils to Capri from Molo Beverello (40 min, ~€25 each way), the Circumvesuviana train to Pompeii from Napoli Porta Nolana station (15 min walk or €10 taxi from the port, 40 min train ride, ~€3).",
    },
    sights: [
      { name: "PICK ONE: Pompeii (if history wins)", note: "Circumvesuviana train from Napoli Porta Nolana, ~40 minutes, €3. Entry to Pompeii is ~€18 and tickets are now personalized — bring photo ID. Allow 3 hours minimum on site, 4 is better. The walking is relentless (uneven ancient stones, zero shade) — **Beverly, this is not for you**. For everyone who can handle it: this is one of the most affecting places on Earth. Go." },
      { name: "PICK ONE: Capri (if romance wins)", note: "Hydrofoil from Molo Beverello, 40 minutes, ~€25 one-way. Get an early boat over (8:30 or 9 AM), take the funicular up from Marina Grande, walk the Via Camerelle and the Gardens of Augustus, eat lunch in Anacapri, chairlift to Monte Solaro for the view, and catch a mid-afternoon boat back. Do NOT try to add Pompeii to this day. You will miss your ship." },
      { name: "PICK ONE: Amalfi Coast (if views win)", note: "Must hire a private driver — public transport doesn't work on a tight timeline, and the Amalfi road is not for self-drivers. Expect €300–500 for a half-day private driver for up to 8 people. Pick Positano OR Amalfi town, not both. Lunch in whichever one you picked. Back by 4 PM or you're risking the ship. Romantic and gorgeous and not cheap." },
      { name: "PICK ONE: Naples itself (underrated)", note: "Everyone skips Naples to go somewhere else. They're wrong. The Archaeological Museum has the real treasures from Pompeii — the frescoes, mosaics, and intact sculptures that made it out. Spaccanapoli, the historic center's knife-straight main street. Pizza at L'Antica Pizzeria da Michele (the one from Eat Pray Love, which is both a blessing and a curse — expect a wait). Zero logistics, maximum flexibility, real city." },
    ],
    food: [
      { name: "L'Antica Pizzeria da Michele", tier: "Pizza · iconic", note: "The margherita that launched a thousand travel blogs. Two options on the menu: marinara or margherita. €6. Expect a 45-minute wait, expect it to be worth it. 10-minute walk from the port. The original location — there are imposters." },
      { name: "Gino Sorbino", tier: "Pizza · locals' pick", note: "If the Michele line is too long (it will be), Gino Sorbino is the quieter locals' favorite for a proper Neapolitan pie. Same €6–10 price range, same wood oven, less drama. Near Via Toledo." },
      { name: "Tandem Ragù", tier: "Mid-range · the other Naples dish", note: "Naples isn't just pizza. Tandem is a tiny place near Piazza San Domenico Maggiore specializing in ragù napoletano — slow-cooked tomato and meat sauce served over pasta with nothing else to distract you. ~€12–18 a plate. This is what locals actually eat." },
      { name: "Sfogliatella at Pintauro", tier: "Pastry · on the go", note: "The sfogliatella is Naples' signature pastry — crisp layered shell, sweet ricotta filling. Pintauro on Via Toledo has been making them since 1818. ~€2 each. Get one warm, eat it standing up, continue with your day. This is a non-negotiable Naples experience." },
    ],
    practical: [
      { label: "Currency", body: "Euros. Prices in Naples are lower than Rome or the Amalfi towns — the city itself is a bargain." },
      { label: "Getting to Pompeii", body: "Circumvesuviana train from Napoli Porta Nolana station (15 min walk or €10 taxi from the port). Trains every ~30 min, €3 one-way, ~40 min ride. Get off at 'Pompei Scavi–Villa dei Misteri' (not 'Pompei'). The station is 50 meters from the ruins entrance. Crowded, no AC, bring water." },
      { label: "Getting to Capri", body: "Hydrofoil from Molo Beverello, right next to the cruise dock. ~40 min each way, ~€25 one-way. In October the sea is usually calm but weather can occasionally cancel runs — have a Plan B." },
      { label: "Pickpockets", body: "Naples has a real pickpocket problem in tourist areas, especially around the train stations and Spaccanapoli. Don't flash phones, keep wallets in front pockets, watch children. This isn't scaremongering, it's just reality. Be alert and you'll be fine." },
      { label: "October weather", body: "Expect 64–74°F / 18–23°C, mostly sunny, some afternoon rain possible. Good touring weather. Pompeii in particular has zero shade, so sunscreen and hat are non-negotiable even in October." },
      { label: "The big warning", body: "Twelve hours sounds like a lot. It isn't. Pick ONE direction and commit. If you try to do Pompeii in the morning and Capri in the afternoon, you will miss the ship. Ships leave on time. Taxis to the next port cost thousands of euros. Pick one story, do it well, save the other for next time." },
    ],
  },
};

  dubrovnik: {

// === COUNTDOWN HOOK ===
function useCountdown(target) {
  const [now, setNow] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const diff = Math.max(0, target.getTime() - now.getTime());
  return {
    days: Math.floor(diff / 86400000),
    hours: Math.floor((diff % 86400000) / 3600000),
    mins: Math.floor((diff % 3600000) / 60000),
    secs: Math.floor((diff % 60000) / 1000),
  };
}

// === HERO ===
// Bev's anthem — small audio player tucked into the hero. Honest opt-in:
// click the pill, the song plays. No autoplay, no first-click trickery.
// MP3 lives at the repo root (mamma-mia.mp3) — Lily James et al, "Mamma Mia"
// from the 2018 Here We Go Again soundtrack.
function BevsAnthem() {
  const [started, setStarted] = useState(false);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0); // 0..1
  const audioRef = useRef(null);

  const handlePlay = () => {
    if (!started) setStarted(true);
    const a = audioRef.current;
    if (!a) return;
    if (a.paused) { a.play(); setPlaying(true); }
    else { a.pause(); setPlaying(false); }
  };

  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    const onTime = () => { if (a.duration) setProgress(a.currentTime / a.duration); };
    const onEnd = () => { setPlaying(false); setProgress(0); };
    a.addEventListener('timeupdate', onTime);
    a.addEventListener('ended', onEnd);
    return () => { a.removeEventListener('timeupdate', onTime); a.removeEventListener('ended', onEnd); };
  }, [started]);

  if (!started) {
    return (
      <div className="mt-5 sm:mt-6 flex justify-center">
        <button
          onClick={handlePlay}
          className="group flex items-center gap-3 px-5 sm:px-6 py-3 rounded-full border transition-all hover:scale-[1.02]"
          style={{ borderColor: 'rgba(244, 217, 127, 0.45)', background: 'rgba(8, 28, 48, 0.5)', backdropFilter: 'blur(8px)' }}
        >
          <span className="flex items-center justify-center w-8 h-8 rounded-full shrink-0" style={{ background: 'radial-gradient(circle at 30% 30%, #f4d97f 0%, #e8a04c 55%, #c1852a 100%)' }}>
            <span className="text-stone-900 text-sm ml-0.5">▶</span>
          </span>
          <span className="text-xs sm:text-sm italic text-amber-100/95 text-left leading-tight" style={serif}>
            Something to set the mood
          </span>
        </button>
      </div>
    );
  }

  return (
    <div className="mt-5 sm:mt-6 flex justify-center">
      <div className="flex items-center gap-3 sm:gap-4 px-4 sm:px-5 py-3 rounded-full border w-full max-w-md" style={{ borderColor: 'rgba(244, 217, 127, 0.45)', background: 'rgba(8, 28, 48, 0.5)', backdropFilter: 'blur(8px)' }}>
        <button
          onClick={handlePlay}
          className="flex items-center justify-center w-9 h-9 rounded-full shrink-0 transition-transform hover:scale-105"
          style={{ background: 'radial-gradient(circle at 30% 30%, #f4d97f 0%, #e8a04c 55%, #c1852a 100%)' }}
          aria-label={playing ? 'Pause' : 'Play'}
        >
          <span className="text-stone-900 text-sm leading-none" style={{ marginLeft: playing ? 0 : '2px' }}>
            {playing ? '❚❚' : '▶'}
          </span>
        </button>
        <div className="flex-1 min-w-0">
          <div className="h-1.5 rounded-full overflow-hidden" style={{ background: 'rgba(244, 217, 127, 0.2)' }}>
            <div className="h-full rounded-full transition-all" style={{ width: `${progress * 100}%`, background: 'linear-gradient(90deg, #e8a04c, #fce8a8)' }} />
          </div>
        </div>
        <audio ref={audioRef} src="mamma-mia.mp3" preload="auto" autoPlay onPlay={() => setPlaying(true)} onPause={() => setPlaying(false)} />
      </div>
    </div>
  );
}

function DayCard({ day, onJumpToPort, onJumpToDay }) {
  const [imgFailed, setImgFailed] = useState(false);
  const styles = {
    travel: { grad: 'linear-gradient(135deg, #f5f5f4, #fafaf9)', accent: '#78716c', label: 'Travel' },
    rome: { grad: 'linear-gradient(135deg, #fef3c7, #fef9e7)', accent: '#c1502e', label: 'Rome' },
    embark: { grad: 'linear-gradient(135deg, #fed7aa, #fef3c7)', accent: '#c1502e', label: 'Embark' },
    sea: { grad: 'linear-gradient(135deg, #dbeafe, #eff6ff)', accent: '#0a3d62', label: 'Sea Day' },
    port: { grad: 'linear-gradient(135deg, #fef3c7, #fed7aa)', accent: '#c1502e', label: 'Port of Call' },
    debark: { grad: 'linear-gradient(135deg, #fed7aa, #fef3c7)', accent: '#c1502e', label: 'Disembark' },
  };
  const s = styles[day.type];
  const isPort = day.type === 'port';
  // Every day is now clickable. Port days jump to the Ports tab for that port.
  // Other days jump to the Day by Day tab scrolled to that day's section.
  const handleClick = () => {
    if (isPort) {
      onJumpToPort && onJumpToPort(day.port);
    } else {
      onJumpToDay && onJumpToDay(day.day);
    }
  };
  const hint = isPort ? 'Tap for port details →' : 'Tap for day details →';
  const showImage = day.image && !imgFailed;

  return (
    <div
      className="relative rounded-xl overflow-hidden transition-all cursor-pointer hover:shadow-lg hover:-translate-y-0.5"
      style={{ background: s.grad, border: '1px solid rgba(193, 168, 108, 0.35)' }}
      onClick={handleClick}
    >
      {day.big && (
        <div className="absolute top-0 right-0 px-3 py-1 text-[9px] font-bold uppercase tracking-wider text-white z-10" style={{ background: 'linear-gradient(90deg, #c1502e, #e8a04c)' }}>
          ⭐ Grand Finale
        </div>
      )}
      <div className="flex items-stretch">
        <div className="flex flex-col items-center justify-center px-4 sm:px-6 py-4 sm:py-5 border-r" style={{ minWidth: '72px', borderColor: 'rgba(193, 168, 108, 0.3)' }}>
          {day.cruiseDay ? (
            <>
              <div className="text-[9px] uppercase tracking-wider font-bold" style={{ ...sans, color: '#a8a29e' }}>Day</div>
              <div className="text-3xl sm:text-5xl leading-none mt-1" style={{ ...serif, color: s.accent }}>{day.cruiseDay}</div>
            </>
          ) : (
            <div className="text-[9px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded" style={{ ...sans, background: s.accent + '18', color: s.accent }}>
              {day.phase === 'pre' ? 'Pre' : 'Post'}
            </div>
          )}
          <div className="text-[10px] text-stone-500 mt-1.5 font-medium" style={sans}>{day.dateShort}</div>
        </div>

        <div className="flex-1 p-4 sm:p-5 min-w-0">
          <div className="flex items-center gap-2 mb-1.5 flex-wrap">
            <span className="text-base sm:text-lg">{day.icon}</span>
            <span className="text-[9px] sm:text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full" style={{ ...sans, background: s.accent + '18', color: s.accent }}>{s.label}</span>
            {day.warn && (
              <span className="text-[9px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full" style={{ ...sans, background: '#fee2b3', color: '#8a4920' }}>⚠ {day.warn}</span>
            )}
            <span className="text-[9px] text-stone-400 ml-auto hidden sm:inline" style={sans}>{hint}</span>
          </div>
          <h4 className="text-lg sm:text-2xl text-stone-900 leading-tight" style={serif}>{day.title}</h4>
          <p className="text-xs sm:text-sm text-stone-600 italic mt-0.5" style={serif}>{day.subtitle}</p>
          <p className="text-xs sm:text-sm text-stone-500 mt-2 leading-relaxed" style={sans}>{day.detail}</p>
        </div>

        {showImage && (
          <div className="hidden sm:block shrink-0 relative" style={{ width: '160px' }}>
            <img
              src={day.image}
              alt=""
              loading="lazy"
              onError={() => setImgFailed(true)}
              className="absolute inset-0 w-full h-full object-cover"
              style={{ borderLeft: '1px solid rgba(193, 168, 108, 0.3)' }}
            />
          </div>
        )}
      </div>
    </div>
  );
}

// Reusable expandable row. Used by Going Rogue (sights/food/practical) and

function Accordion({ icon, title, meta, accent = '#c1502e', defaultOpen = false, children }) {

            )}

        </div>
        <span className="flex-shrink-0 text-stone-400 transition-transform" style={{ transform: open ? 'rotate(180deg)' : 'rotate(0deg)' }}>

        </div>
      )}
    </div>
  );
}

// Build a Google Maps search URL that works on web and mobile.
// Universal format that opens Google Maps on desktop and the Maps app on mobile.
// No API key required. We use the search-by-text format because place IDs
// would require a separate lookup we don't want to maintain.
function mapsLink(name, city) {
  const q = encodeURIComponent(`${name}, ${city}`);
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

// Small inline "Find on Maps" link component for use in expanded accordion rows.
function MapsLink({ name, city }) {
  return (
    <a
      href={mapsLink(name, city)}
      target="_blank"
      rel="noopener noreferrer"
      onClick={(e) => e.stopPropagation()}
      className="inline-flex items-center gap-1 mt-2 text-[11px] font-semibold uppercase tracking-wider hover:underline"
      style={{ ...sans, color: '#0a3d62' }}
    >
      <span>📍</span>
      <span>Find on Maps</span>
      <span aria-hidden="true">↗</span>
    </a>
  );
}

// Scheduled items (flights, transfers, tours) rendered as accordion entries.
// Each item collapses by default — header shows time + label, expanding reveals body.
// Day-level scannability: see the timeline at a glance, drill in for detail.
function DayScheduleBlock({ schedule, accent, isGladiator }) {
  return (
    <div className="space-y-2">
      {schedule.map((item, i) => {
        const paragraphs = item.body.split('\n\n');
        return (
          <Accordion
            key={i}
            title={item.label}
            meta={item.time}
            accent={accent}
          >
            {paragraphs.map((para, pi) => (
              <p key={pi} className={pi > 0 ? 'mt-2' : ''}>
                {para.split('**').map((chunk, j) => j % 2 === 1 ? <strong key={j} className="font-semibold text-stone-900">{chunk}</strong> : <span key={j}>{chunk}</span>)}
              </p>
            ))}
          </Accordion>
        );
      })}
      {isGladiator && (
        <p className="text-center text-[10px] uppercase tracking-[0.28em] font-bold pt-2" style={{ ...sans, color: '#8a4920' }}>· Roma Æterna ·</p>
      )}
    </div>
  );
}

// Sea day block — shows a typical daily rhythm timeline, a dress code badge
// if one is set, and a list of ideas. The rhythm is "a typical day like this,"
// not the actual published schedule — the real Fun Times newsletter gets
// delivered to the cabin each night with specifics.
function SeaDayBlock({ details }) {
  if (!details) return null;
  const { rhythm, ideas, theme, dressCode } = details;

  // Simple markdown-ish bold parser for ideas (supports **text** → <strong>).
  const renderIdea = (text) => {
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((part, i) => {
      if (part.startsWith('**') && part.endsWith('**')) {
        return <strong key={i} className="font-semibold text-stone-900">{part.slice(2, -2)}</strong>;
      }
      return <span key={i}>{part}</span>;
    });
  };

  return (
    <div className="space-y-4">
      {/* Theme + dress code badges — kept visible (identity, not detail) */}
      {(theme || dressCode) && (
        <div className="flex items-center gap-2 flex-wrap">
          {theme && (
            <span className="text-[10px] uppercase tracking-[0.2em] font-bold px-3 py-1.5 rounded-full" style={{ ...sans, background: '#0a3d62', color: '#fef9e7' }}>
              🌊 {theme}
            </span>
          )}
          {dressCode && (
            <span className="text-[10px] uppercase tracking-[0.2em] font-bold px-3 py-1.5 rounded-full" style={{ ...sans, background: '#fef3c7', color: '#8a6d2b', border: '1px solid #f0d060' }}>
              ✦ {dressCode}
            </span>
          )}
        </div>
      )}

      {/* Daily rhythm — section accordion containing per-item accordions */}
      {rhythm && rhythm.length > 0 && (
        <Accordion icon="🕐" title="A day in the life" accent="#0a3d62">
          <div className="space-y-2 mt-2">
            {rhythm.map((item, i) => (
              <Accordion key={i} title={item.label} meta={item.time} accent="#0a3d62">
                <p>{item.body}</p>
              </Accordion>
            ))}
            <p className="mt-3 text-[11px] text-stone-500 italic" style={serif}>
              Real times come from the Fun Times newsletter delivered to your cabin each night. This is the typical shape of a Carnival Legend sea day.
            </p>
          </div>
        </Accordion>
      )}

      {/* Ideas list — section accordion */}
      {ideas && ideas.length > 0 && (
        <Accordion icon="💡" title="Don't miss" accent="#3b7ea1">
          <ul className="space-y-3 mt-2">
            {ideas.map((idea, i) => (
              <li key={i} className="flex items-start gap-3">
                <span className="mt-2 w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: '#0a3d62' }} />
                <span>{renderIdea(idea)}</span>
              </li>
            ))}
          </ul>
        </Accordion>
      )}
    </div>
  );
}

// Port day block — shows port arrival/departure, then the excursion list.
// Voting is open; taps on an excursion jump to the Ports tab to vote.
// Alla Carta / Going Rogue alternatives always live over on the Ports tab.
function PortDayBlock({ portId, onJumpToPort, getVoteSummary }) {
  const port = PORTS.find(p => p.id === portId);
  const allExcursions = EXCURSIONS[portId] || [];
  if (!port) return null;

  return (
    <div className="space-y-5">
      {/* Port hours callout */}
      <div className="rounded-xl p-4 sm:p-5 text-white" style={{ background: port.gradient }}>
        <div className="flex items-baseline justify-between gap-3 flex-wrap">
          <div>
            <p className="text-[10px] uppercase tracking-[0.25em] font-bold opacity-80" style={sans}>Port Hours</p>
            <p className="text-xl sm:text-2xl mt-0.5" style={serif}>{port.hours}</p>
          </div>
          <button
            onClick={() => onJumpToPort && onJumpToPort(portId)}
            className="px-4 py-2 rounded-full text-[11px] font-bold uppercase tracking-wider transition-all hover:-translate-y-0.5 cursor-pointer"
            style={{ ...sans, background: 'rgba(255,255,255,0.95)', color: port.color }}
          >
            Full {port.name} page →
          </button>
        </div>
      </div>

      {/* Excursions list — wrapped in section accordion */}
      <Accordion icon="⚓" title={`Carnival excursion options (${allExcursions.length})`} accent={port.color}>
        <div className="space-y-2 mt-2">
          {allExcursions.map(exc => {
            const summary = getVoteSummary ? getVoteSummary(exc.id) : { yes: [], maybe: [], no: [] };
            const yesCount = Array.isArray(summary.yes) ? summary.yes.length : (summary.yes || 0);
            const maybeCount = Array.isArray(summary.maybe) ? summary.maybe.length : (summary.maybe || 0);
            const noCount = Array.isArray(summary.no) ? summary.no.length : (summary.no || 0);
            const totalVotes = yesCount + maybeCount + noCount;
            return (
              <div
                key={exc.id}
                onClick={() => onJumpToPort && onJumpToPort(portId)}
                className="bg-white rounded-lg p-3 sm:p-4 shadow-sm cursor-pointer transition-all hover:-translate-y-0.5 hover:shadow-md"
                style={{ border: '1px solid rgba(193, 168, 108, 0.3)', borderLeft: `3px solid ${port.color}` }}
              >
                <div className="flex items-start gap-3">
                  <div className="text-xs font-bold flex-shrink-0 mt-0.5 px-1.5 py-0.5 rounded" style={{ ...sans, background: port.color + '18', color: port.color, minWidth: '28px', textAlign: 'center' }}>#{exc.num}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline justify-between gap-2 flex-wrap">
                      <p className="font-semibold text-stone-900 text-sm sm:text-base leading-tight" style={serif}>{exc.title}</p>
                      {exc.featured && <span className="text-[9px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded-full whitespace-nowrap" style={{ ...sans, background: '#fef3c7', color: '#8a6d2b' }}>★ Featured</span>}
                    </div>
                    <div className="flex items-center gap-2 sm:gap-3 mt-1 text-[10px] sm:text-xs text-stone-500 flex-wrap" style={sans}>
                      <span>{exc.duration}</span>
                      <span>·</span>
                      <span>{exc.activity}</span>
                      <span>·</span>
                      <span>{exc.price}</span>
                      {exc.restrictions && exc.restrictions.includes('chloe') && <span className="text-[9px] text-red-700">🚫 Chloe</span>}
                      {exc.restrictions && exc.restrictions.includes('bev') && <span className="text-[9px] text-amber-700">⚠ Bev</span>}
                    </div>
                    {totalVotes > 0 && (
                      <div className="flex items-center gap-3 mt-2 text-[10px]" style={sans}>
                        {yesCount > 0 && <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500" />{yesCount} yes</span>}
                        {maybeCount > 0 && <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-500" />{maybeCount} maybe</span>}
                        {noCount > 0 && <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-stone-400" />{noCount} no</span>}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
          <p className="mt-3 text-[11px] text-stone-500 italic text-center" style={serif}>
            Tap any excursion to open the full {port.name} page for details and voting.
          </p>
        </div>
      </Accordion>
    </div>
  );
}

// === NEED TO KNOW TAB ===
// Practical logistics: payment deadlines, passports, packing, money, dress codes,

      urgency: 'red',
      icon: '🛂',
      title: 'Passports · check yours NOW',
      body: "Every family member traveling needs a passport valid for at least 6 months beyond the trip return date (April 12, 2027 or later). Check the expiration date today. If anyone's is expiring before April 2027, renew it now — processing takes 6–8 weeks for standard, 2–3 for expedited, and the State Department occasionally runs slower than that. A group trip has a lot of chances for one person to derail the whole thing over a bad passport. For Chloe specifically: children's passports are separate from adult ones and also need to be checked. REAL ID is for domestic flights only and doesn't apply to international travel — a passport is what you need.",
    },
    {
      urgency: 'amber',
      icon: '🤢',
      title: 'Motion sickness, mobility & the Kotor tender',
      body: "Two things rolled into one because they overlap: Bev's motion sickness and the Kotor tender port.\n\n**Bev's motion sickness** — serpentine drives (Kotor's switchbacks up to Njeguši or Lovćen, Amalfi Coast road, Corfu's hill roads), small boats in open water, sailing days, and long tender rides can all set it off. Dramamine (or the Bonine/meclizine version, less drowsy) taken 30–60 minutes *before* the trigger is the move — once the nausea starts it's too late. Ginger candies as a backup. Bev can handle easy walks on level ground all day long. What to watch for: anything tagged 🥾 Strenuous hike on the excursion cards (real uphill, rocky, uneven) — that's where she and Brett (recovering from summer knee surgery) should hang back. Cobblestones and stone paths get a softer ⚠ flag — doable at her own pace.\n\n**Kotor tender port (Day 5, Tue Oct 6)** — Carnival Legend anchors out in Boka Bay and a smaller tender boat shuttles guests to the pier. Mobility devices must be collapsible to board the tender, and there are a few steps to navigate. Bev and Brett should plan extra time on both ends and sit near the front of the tender for an easier step-off. The ride is 5–20 minutes depending on how busy the bay is. If the seas are rough, tender service can be suspended, so build in buffer if anyone books a time-sensitive excursion on shore. Front of the tender = less sway; Dramamine before boarding for anyone prone.",
    },
    {
      urgency: 'amber',
      icon: '💳',

    },
    {
      urgency: 'amber',

// Subtle banner shown above the tab content when votes aren't syncing.
// Two states that warrant a banner:
//   - 'disabled': VOTES_API is still the placeholder. Votes save locally
//                 only and won't reach Bev yet. "Coming soon" copy.
//   - 'offline': Worker is deployed but unreachable from this device.
//                Votes still save locally but aren't leaving this browser.
// Synced and loading states render nothing so the UI stays clean.
function SyncBanner({ mode }) {
  if (mode === 'synced' || mode === 'loading') return null;
  const isDisabled = mode === 'disabled';
  return (
    <div className="px-4 sm:px-6 pt-4">
      <div className="max-w-5xl mx-auto rounded-lg px-4 py-2.5 flex items-start gap-3" style={{ background: isDisabled ? '#fff4e0' : '#fde4d9', border: `1px solid ${isDisabled ? 'rgba(212,168,76,0.5)' : 'rgba(193,80,46,0.4)'}` }}>
        <span className="text-base leading-none mt-0.5">{isDisabled ? '🛠️' : '📡'}</span>
        <div className="flex-1 text-xs sm:text-sm leading-snug" style={{ ...sans, color: '#6b4a1f' }}>
          {isDisabled ? (
            <><strong>Vote sync coming soon.</strong> Votes are saving on your device for now — cross-device tallies go live once Mamma Bev flips the switch.</>
          ) : (
            <><strong>Votes aren&rsquo;t syncing right now.</strong> Your picks are saved on this device, but they won&rsquo;t reach everyone else until you&rsquo;re back online. Refresh to retry.</>
          )}
        </div>
      </div>
    </div>
  );
}

// === ROOT ===
function HetricksAbroad() {
  const [tab, setTab] = useState('overview');
  const [activePort, setActivePort] = useState('split');
  const [activeSection, setActiveSection] = useState('ship');
  // New vote shape (Round 8): votes[excId] = { [voterName]: 'yes'|'maybe'|'no' }
  // Old shape was votes[excId] = 'yes'. Migration happens on load.
  const [votes, setVotes] = useState({});
  const [notes, setNotes] = useState({});
  const [editingNote, setEditingNote] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [expandedCards, setExpandedCards] = useState({});
  // Active voter — whose votes the current device is casting. Stored in
  // localStorage as `cruise-active-voter` so people don't re-pick every visit.
  const [activeVoter, setActiveVoter] = useState(null);
  // Sync state. `syncMode` is 'loading' | 'synced' | 'offline' | 'disabled'.
  // - 'disabled' = VOTES_API is still a placeholder, site runs on localStorage.
  // - 'loading'  = initial fetch to Worker in-flight.
  // - 'synced'   = Worker is reachable, votes are authoritative.
  // - 'offline'  = Worker unreachable; we show a banner and still accept votes
  //                locally so the UI doesn't break, but warn they aren't syncing.
  const [syncMode, setSyncMode] = useState(SYNC_ENABLED ? 'loading' : 'disabled');

  // Load fonts
  useEffect(() => {
    if (document.getElementById('hetricks-fonts')) return;
    const link = document.createElement('link');
    link.id = 'hetricks-fonts';
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap';
    document.head.appendChild(link);

    // Scrollbar hide
    const style = document.createElement('style');
    style.id = 'hetricks-style';
    style.textContent = '.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{scrollbar-width:none}';
    document.head.appendChild(style);
  }, []);

  // Load persisted votes/notes on mount. When sync is enabled, votes come
  // from the Worker (authoritative) and we stop mirroring them to
  // localStorage — the Worker is the source of truth. When sync is disabled
  // (placeholder URL), we read votes from localStorage as before so the live
  // site keeps working pre-deploy. Notes stay local per-device either way —
  // they were always a personal scratchpad, not a group decision.
  useEffect(() => {
    (async () => {
      try {
        if (SYNC_ENABLED) {
          try {
            const res = await fetch(`${VOTES_API}/`, { method: 'GET' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            setVotes(data || {});
            setSyncMode('synced');
          } catch (err) {
            // Worker unreachable — fall back to whatever is in localStorage
            // so the UI still shows something sensible, but flag it.
            if (typeof window !== 'undefined' && window.storage) {
              const vRes = await window.storage.get('cruise-votes-multi', true).catch(() => null);
              if (vRes?.value) setVotes(JSON.parse(vRes.value));
            }
            setSyncMode('offline');
          }
        } else if (typeof window !== 'undefined' && window.storage) {
          const vRes = await window.storage.get('cruise-votes-multi', true).catch(() => null);
          if (vRes?.value) setVotes(JSON.parse(vRes.value));
        }
        if (typeof window !== 'undefined' && window.storage) {
          const nRes = await window.storage.get('cruise-notes-open', true).catch(() => null);
          if (nRes?.value) setNotes(JSON.parse(nRes.value));
          // Active voter stored per-device (not shared)
          const avRes = await window.storage.get('cruise-active-voter', false).catch(() => null);
          if (avRes?.value) setActiveVoter(avRes.value);
        }
      } catch {}
    })();
  }, []);

  const saveVotesLocal = useCallback(async (v) => {
    try {
      if (typeof window !== 'undefined' && window.storage) {
        await window.storage.set('cruise-votes-multi', JSON.stringify(v), true);
      }
    } catch {}
  }, []);

  const saveNotesStore = useCallback(async (n) => {
    try {
      if (typeof window !== 'undefined' && window.storage) {
        await window.storage.set('cruise-notes-open', JSON.stringify(n), true);
      }
    } catch {}
  }, []);

  const saveActiveVoter = useCallback(async (name) => {
    try {
      if (typeof window !== 'undefined' && window.storage) {
        if (name) await window.storage.set('cruise-active-voter', name, false);
      }
    } catch {}
  }, []);

  const chooseVoter = (name) => {
    setActiveVoter(name);
    saveActiveVoter(name);
  };

  // Cast a vote AS the current activeVoter. Tapping the same vote twice
  // clears that voter's vote on that item. Without an active voter the
  // vote no-ops — UI prompts them to pick a name first.
  //
  // Sync behavior: when the Worker is live, we optimistically apply the
  // change locally, then POST { voter, itemId, vote } and reconcile from
  // the response (source of truth). On network failure we revert and flip
  // to 'offline' mode so the banner warns the user. When sync is disabled
  // (placeholder URL) or offline, we just write to localStorage as before.
  const castVote = (excId, vote) => {
    if (!activeVoter) return;
    const prevVotes = votes;
    const newVotes = { ...votes };
    const excVotes = { ...(newVotes[excId] || {}) };
    if (excVotes[activeVoter] === vote) {
      delete excVotes[activeVoter];
    } else {
      excVotes[activeVoter] = vote;
    }
    if (Object.keys(excVotes).length === 0) {
      delete newVotes[excId];
    } else {
      newVotes[excId] = excVotes;
    }
    // Optimistic update
    setVotes(newVotes);

    if (SYNC_ENABLED && syncMode !== 'disabled') {
      // Worker uses tap-same-vote-twice-toggles semantics, same as the
      // client. We always send the raw vote value — the Worker figures
      // out whether it's a set or a clear by comparing to what's stored.
      fetch(`${VOTES_API}/vote`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          voter: activeVoter,
          itemId: excId,
          vote: vote,
        }),
      })
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(serverVotes => {
          setVotes(serverVotes || {});
          if (syncMode !== 'synced') setSyncMode('synced');
        })
        .catch(() => {
          // Revert and warn
          setVotes(prevVotes);
          setSyncMode('offline');
        });
    } else {
      // Fallback: persist locally.
      saveVotesLocal(newVotes);
    }
  };

  const saveNote = (excId) => {
    const newNotes = { ...notes };
    if (noteText.trim()) newNotes[excId] = noteText.trim();
    else delete newNotes[excId];
    setNotes(newNotes);
    saveNotesStore(newNotes);
    setEditingNote(null);
    setNoteText('');
  };

  // Vote summary: returns { yes: [names], maybe: [names], no: [names] }
  // so the card can render name chips grouped by vote. Empty arrays where
  // nobody picked that option.
  const getVoteSummary = (excId) => {
    const s = { yes: [], maybe: [], no: [] };
    const excVotes = votes[excId];
    if (!excVotes) return s;
    Object.keys(excVotes).forEach(name => {
      const v = excVotes[name];
      if (s[v]) s[v].push(name);
    });
    return s;
  };

  const toggleCard = (id) => setExpandedCards(p => ({ ...p, [id]: !p[id] }));

  const jumpToPort = (portId) => {
    setActivePort(portId);
    setActiveSection('ship');
    setTab('ports');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const jumpToDay = (dayNum) => {
    setTab('daybyday');
    // Delay scroll until after the DayByDayTab mounts and renders.
    setTimeout(() => {
      const el = document.getElementById(`day-${dayNum}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }, 50);
  };

  return (
    <div className="min-h-screen" style={{ background: '#fdf6e8', ...sans }}>
      <TabBar active={tab} onChange={setTab} />
      <Hero />

      <main>
        <SyncBanner mode={syncMode} />
        {tab === 'overview' && <ItineraryOverview onJumpToPort={jumpToPort} onJumpToDay={jumpToDay} />}
        {tab === 'daybyday' && <DayByDayTab onJumpToPort={jumpToPort} getVoteSummary={getVoteSummary} />}
        {tab === 'legend' && <LegendSection />}
        {tab === 'ports' && (
          <PortsTab
            activePort={activePort}
            setActivePort={setActivePort}
            votes={votes}
            notes={notes}
            editingNote={editingNote}
            setEditingNote={setEditingNote}
            noteText={noteText}
            setNoteText={setNoteText}
            castVote={castVote}
            saveNote={saveNote}
            getVoteSummary={getVoteSummary}
            expandedCards={expandedCards}
            toggleCard={toggleCard}
            activeSection={activeSection}
            setActiveSection={setActiveSection}
            activeVoter={activeVoter}
            chooseVoter={chooseVoter}
          />
        )}
        {tab === 'know' && <NeedToKnowTab />}
        {tab === 'crew' && <CrewTab />}
      </main>

      <footer className="mt-16 py-10 text-center" style={{ background: '#fbf0d9', borderTop: '2px solid rgba(193, 168, 108, 0.4)' }}>
        <p className="text-base sm:text-lg italic max-w-xl mx-auto px-6 leading-snug" style={{ ...serif, color: '#8a4920' }}>
          &ldquo;It is good to have an end to journey toward; but it is the journey that matters, in the end.&rdquo;
        </p>
        <div className="mt-4 mx-auto w-16 h-[2px]" style={{ background: 'linear-gradient(90deg, transparent, #c1502e, transparent)' }} />
        <p className="mt-4 text-xl italic" style={{ ...serif, color: '#8a3520' }}>A Mediterranean Affair</p>
        <p className="text-[10px] uppercase tracking-[0.3em] text-stone-500 mt-2 font-semibold" style={sans}>Curated with love by Mamma Bev · October 2026</p>
      </footer>
    </div>
  );
}
